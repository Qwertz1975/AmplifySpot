<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AmplifySpot - Playlist</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyCh2E0vwYvutYSrdFLSH2YRyucJyuF4hIo",
            authDomain: "amplifyspot-7c61d.firebaseapp.com",
            projectId: "amplifyspot-7c61d",
            storageBucket: "amplifyspot-7c61d.firebasestorage.app",
            messagingSenderId: "698969608189",
            appId: "1:698969608189:web:e5f353e4367b1fc84a5394",
            measurementId: "G-XWCDE06385"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        
        window.currentUserEmail = null;
        window.currentUserName = null;

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.replace("index.html"); 
            } else {
                window.currentUserEmail = user.email;
                window.currentUserName = user.displayName || "Unknown User"; 
                
                if(window.fetchPlaylists) {
                    window.fetchPlaylists(); 
                }
            }
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap');
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: #121212; color: #ffffff; 
            padding-bottom: 80px; overflow-x: hidden;
        }

        .header {
            padding: 20px; background: linear-gradient(180deg, #1f1f1f 0%, #121212 100%);
            position: sticky; top: 0; z-index: 10;
        }
        .logo { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 15px; }
        .logo span { color: #1db954; }

        .content { padding: 0 20px; }
        .section-title { font-size: 18px; font-weight: 600; margin-bottom: 15px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; }
        
        /* TOMBOL CREATE PLAYLIST */
        .create-pl-btn {
            background: #242424; color: white; border: 1px solid #333;
            padding: 10px 15px; border-radius: 20px; font-size: 13px; font-weight: 600;
            cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 5px;
        }
        .create-pl-btn:hover { background: #333; border-color: #1db954; }

        /* PLAYLIST CARD */
        .playlist-card {
            background: #181818; border: 1px solid #282828; border-radius: 10px;
            padding: 15px; margin-bottom: 10px; cursor: pointer; transition: 0.2s;
            display: flex; align-items: center; justify-content: space-between;
        }
        .playlist-card:hover { background: #242424; border-color: #1db954; }
        .pl-info { flex: 1; }
        .pl-name { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
        .pl-meta { font-size: 12px; color: #b3b3b3; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .pl-badge { background: #333; padding: 2px 6px; border-radius: 4px; font-size: 10px; }
        .pl-badge.public { background: #1db954; color: black; }
        
        .pl-actions { display: flex; gap: 10px; }
        .action-icon { color: #b3b3b3; cursor: pointer; padding: 5px; transition: 0.2s; }
        .action-icon:hover { color: #fff; }

        /* SONG ITEM */
        .song-item { display: flex; align-items: center; padding: 10px; border-radius: 8px; transition: 0.2s; margin-bottom: 5px; }
        .song-item:hover { background: #282828; }
        .song-cover { width: 40px; height: 40px; border-radius: 4px; background: #282828; display: flex; align-items: center; justify-content: center; color: #b3b3b3; margin-right: 15px; }
        .song-info { flex: 1; overflow: hidden; }
        .song-title { font-weight: 600; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .song-author { font-size: 12px; color: #b3b3b3; margin-top: 3px; }
        .play-btn { color: #1db954; background: none; border: none; cursor: pointer; }

        /* VIEW TOGGLE */
        #playlistDetailView { display: none; }
        .back-btn { background: none; border: none; color: #b3b3b3; font-size: 14px; cursor: pointer; margin-bottom: 15px; display: flex; align-items: center; gap: 5px; }
        .back-btn:hover { color: white; }
        
        /* AUTOPLAY BUTTON */
        .shuffle-btn {
            background: #1db954; color: black; border: none; padding: 10px 20px;
            border-radius: 25px; font-weight: 600; font-size: 14px; cursor: pointer;
            margin-bottom: 15px; width: 100%; display: flex; justify-content: center; align-items: center; gap: 8px;
        }

        /* BOTTOM NAV BAR */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; background: rgba(24, 24, 24, 0.95);
            backdrop-filter: blur(10px); border-top: 1px solid #282828;
            display: flex; justify-content: space-around; align-items: center; padding: 10px 0; z-index: 100;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #b3b3b3; font-size: 11px; cursor: pointer; width: 25%; }
        .nav-item:hover, .nav-item.active { color: #ffffff; }
        .nav-icon { width: 24px; height: 24px; margin-bottom: 4px; fill: currentColor; }
        
        /* MODALS */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 200; justify-content: center; align-items: center; padding: 20px; }
        .modal.show { display: flex; }
        .modal-content { background: #181818; width: 100%; max-width: 400px; border-radius: 12px; padding: 25px; position: relative; border: 1px solid #282828; }
        .close-modal { position: absolute; top: 20px; right: 20px; font-size: 24px; color: #b3b3b3; cursor: pointer; }
        .form-group { margin-bottom: 15px; }
        .form-input { width: 100%; padding: 12px; background: #242424; border: 1px solid transparent; border-radius: 6px; color: white; outline: none; }
        .form-input:focus { border-color: #1db954; }
        .submit-btn { width: 100%; padding: 14px; background: #1db954; color: black; border: none; border-radius: 25px; font-weight: 600; font-size: 15px; cursor: pointer; margin-top: 10px; }
        .delete-btn { width: 100%; padding: 14px; background: transparent; color: #ff4d4d; border: 1px solid #ff4d4d; border-radius: 25px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        
        /* CHECKBOX TOGGLE */
        .toggle-wrap { display: flex; align-items: center; gap: 10px; margin-top: 10px; font-size: 14px; color: #b3b3b3; }
        .toggle-wrap input { width: 18px; height: 18px; accent-color: #1db954; }

        /* PLAYER */
        #globalPlayer { position: fixed; bottom: 65px; left: 0; width: 100%; background: #181818; padding: 10px 20px; display: none; align-items: center; border-top: 1px solid #282828; z-index: 99; }
        #globalPlayer.active { display: flex; }
        audio { width: 100%; height: 30px; outline: none; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">Amplify<span>Spot</span></div>
    </div>

    <div class="content">
        <div id="playlistListView">
            <div class="section-title">
                My Playlists
                <button class="create-pl-btn" onclick="bukaModalCreate()">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                    New
                </button>
            </div>
            <div id="playlistsContainer">
                <div style="text-align:center; color:#b3b3b3; margin-top:20px;">Memuat playlist...</div>
            </div>
        </div>

        <div id="playlistDetailView">
            <button class="back-btn" onclick="kembaliKeDaftar()">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
                Kembali
            </button>
            <h2 id="detailTitle" style="margin-bottom: 5px;">Nama Playlist</h2>
            <div id="detailMeta" style="font-size: 12px; color: #b3b3b3; margin-bottom: 20px;">0 Songs</div>
            
            <button class="shuffle-btn" onclick="playAutoplayRandom()">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
                Autoplay Random
            </button>

            <div id="playlistSongsContainer"></div>
        </div>
    </div>

    <div id="globalPlayer">
        <audio id="audioElement" controls controlsList="nodownload"></audio>
    </div>

    <div class="bottom-nav">
        <div class="nav-item" onclick="window.location.href='/main'">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M12 3l10 9h-3v9h-14v-9h-3l10-9zm0 2.83l-7 6.3v7.87h14v-7.87l-7-6.3z"/></svg>
            Main
        </div>
        <div class="nav-item" onclick="window.location.href='/profile'">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M12 2c2.76 0 5 2.24 5 5s-2.24 5-5 5-5-2.24-5-5 2.24-5 5-5zm0 12c4.42 0 8 3.58 8 8h-16c0-4.42 3.58-8 8-8z"/></svg>
            Profile
        </div>
        <div class="nav-item active">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4v-10h4v-4h-6z"/></svg>
            Playlist
        </div>
    </div>

    <div class="modal" id="createModal">
        <div class="modal-content">
            <div class="close-modal" onclick="tutupModalCreate()">&times;</div>
            <h3>Create New Playlist</h3>
            <div class="form-group">
                <input type="text" id="createName" class="form-input" placeholder="Name Playlist" required>
            </div>
            <div class="toggle-wrap">
                <input type="checkbox" id="createPublic">
                <label for="createPublic">Public Playlist (Orang lain bisa cari)</label>
            </div>
            <button class="submit-btn" id="btnCreate" onclick="buatPlaylist()">Create</button>
            <div id="createStatus" style="text-align: center; margin-top: 10px; font-size: 13px;"></div>
        </div>
    </div>

    <div class="modal" id="editModal">
        <div class="modal-content">
            <div class="close-modal" onclick="tutupModalEdit()">&times;</div>
            <h3>Edit Playlist</h3>
            <input type="hidden" id="editId">
            <div class="form-group">
                <input type="text" id="editName" class="form-input" required>
            </div>
            <div class="toggle-wrap">
                <input type="checkbox" id="editPublic">
                <label for="editPublic">Public Playlist</label>
            </div>
            <button class="submit-btn" id="btnEdit" onclick="simpanEditPlaylist()">Save Changes</button>
            <button class="delete-btn" id="btnDelete" onclick="hapusPlaylist()">Delete Playlist</button>
            <div id="editStatus" style="text-align: center; margin-top: 10px; font-size: 13px;"></div>
        </div>
    </div>

    <script>
        // INISIALISASI SUPABASE
        let clientSupabase = null;
        try {
            const SUPABASE_URL = 'https://vnuyqnandbsuibnbbbcg.supabase.co';
            const SUPABASE_KEY = 'sb_publishable_kV3A57UcwSynM2GufS_x4g_bsL4n--d';
            if (window.supabase) clientSupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        } catch (e) { console.error(e); }

        window.allPlaylists = [];
        window.currentSongsInPlaylist = [];
        window.isAutoplayActive = false;

        // MODAL CREATE
        window.bukaModalCreate = () => { document.getElementById('createModal').classList.add('show'); }
        window.tutupModalCreate = () => { document.getElementById('createModal').classList.remove('show'); document.getElementById('createStatus').innerText=''; }
        
        // MODAL EDIT
        window.bukaModalEdit = (id, event) => {
            event.stopPropagation(); // Mencegah klik masuk ke dalam playlist
            const pl = window.allPlaylists.find(p => p.id == id);
            if(pl) {
                document.getElementById('editId').value = pl.id;
                document.getElementById('editName').value = pl.name;
                document.getElementById('editPublic').checked = pl.is_public;
                document.getElementById('editModal').classList.add('show');
            }
        }
        window.tutupModalEdit = () => { document.getElementById('editModal').classList.remove('show'); document.getElementById('editStatus').innerText=''; }

        // FETCH PLAYLISTS (Milik user saat ini)
        window.fetchPlaylists = async function() {
            if(!clientSupabase || !window.currentUserEmail) return;
            const container = document.getElementById('playlistsContainer');
            
            try {
                const { data, error } = await clientSupabase.from('playlists').select('*').eq('owner_email', window.currentUserEmail).order('id', { ascending: false });
                if (error) throw error;
                
                window.allPlaylists = data || [];
                renderPlaylists();
            } catch (err) {
                // TAMPILKAN PESAN ERROR ASLI DARI SUPABASE AGAR BISA DICEK
                console.error("Detail Error:", err);
                container.innerHTML = `
                    <div style="text-align:center; color:#ff4d4d; margin-top:20px;">
                        Gagal memuat playlist.<br><br>
                        <span style="font-size:12px; color:#ffae42;">Info Error: ${err.message || JSON.stringify(err)}</span>
                    </div>`;
            }
        }

        // RENDER DAFTAR PLAYLIST
        window.renderPlaylists = function() {
            const container = document.getElementById('playlistsContainer');
            container.innerHTML = '';

            if(window.allPlaylists.length === 0) {
                container.innerHTML = `<div style="text-align:center; color:#b3b3b3; margin-top:20px;">Kamu belum punya playlist.</div>`;
                return;
            }

            window.allPlaylists.forEach(pl => {
                const songCount = pl.songs ? pl.songs.length : 0;
                const badge = pl.is_public ? `<span class="pl-badge public">Public</span>` : `<span class="pl-badge">Private</span>`;
                const editIcon = `<svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>`;
                const authorName = pl.owner_username || 'Unknown';

                const html = `
                    <div class="playlist-card" onclick="bukaPlaylist('${pl.id}')">
                        <div class="pl-info">
                            <div class="pl-name">${pl.name}</div>
                            <div class="pl-meta">${badge} <span>${songCount} Songs</span> <span>• by ${authorName}</span></div>
                        </div>
                        <div class="pl-actions">
                            <div class="action-icon" onclick="bukaModalEdit('${pl.id}', event)">${editIcon}</div>
                        </div>
                    </div>
                `;
                container.innerHTML += html;
            });
        }

        // BUAT PLAYLIST BARU 
        window.buatPlaylist = async function() {
            const name = document.getElementById('createName').value.trim();
            const isPublic = document.getElementById('createPublic').checked;
            const status = document.getElementById('createStatus');
            const btn = document.getElementById('btnCreate');

            if(!name) { status.style.color = '#ff4d4d'; status.innerText = 'Nama playlist wajib diisi!'; return; }
            if(window.allPlaylists.length >= 10) { status.style.color = '#ff4d4d'; status.innerText = 'Batas maksimal 10 playlist tercapai!'; return; }

            btn.disabled = true; status.style.color = '#a0a0a0'; status.innerText = 'Membuat...';

            try {
                const { error } = await clientSupabase.from('playlists').insert([
                    { 
                        name: name, 
                        owner_email: window.currentUserEmail, 
                        owner_username: window.currentUserName, 
                        is_public: isPublic, 
                        songs: [] 
                    }
                ]);
                if(error) throw error;

                document.getElementById('createName').value = '';
                document.getElementById('createPublic').checked = false;
                tutupModalCreate(); fetchPlaylists();
            } catch (err) {
                status.style.color = '#ff4d4d'; status.innerText = 'Gagal membuat playlist: ' + err.message;
            }
            btn.disabled = false;
        }

        // EDIT PLAYLIST
        window.simpanEditPlaylist = async function() {
            const id = document.getElementById('editId').value;
            const name = document.getElementById('editName').value.trim();
            const isPublic = document.getElementById('editPublic').checked;
            const status = document.getElementById('editStatus');
            const btn = document.getElementById('btnEdit');

            if(!name) { status.style.color = '#ff4d4d'; status.innerText = 'Nama tidak boleh kosong!'; return; }
            btn.disabled = true; status.style.color = '#a0a0a0'; status.innerText = 'Menyimpan...';

            try {
                const { error } = await clientSupabase.from('playlists').update({ name: name, is_public: isPublic }).eq('id', id);
                if(error) throw error;
                tutupModalEdit(); fetchPlaylists();
            } catch (err) {
                status.style.color = '#ff4d4d'; status.innerText = 'Gagal menyimpan: ' + err.message;
            }
            btn.disabled = false;
        }

        // HAPUS PLAYLIST
        window.hapusPlaylist = async function() {
            const id = document.getElementById('editId').value;
            const status = document.getElementById('editStatus');
            const btn = document.getElementById('btnDelete');

            if(!confirm("Yakin ingin menghapus playlist ini?")) return;
            btn.disabled = true; status.style.color = '#a0a0a0'; status.innerText = 'Menghapus...';

            try {
                const { error } = await clientSupabase.from('playlists').delete().eq('id', id);
                if(error) throw error;
                tutupModalEdit(); fetchPlaylists();
            } catch (err) {
                status.style.color = '#ff4d4d'; status.innerText = 'Gagal menghapus: ' + err.message;
            }
            btn.disabled = false;
        }

        // BUKA DETAIL PLAYLIST
        window.bukaPlaylist = function(id) {
            const pl = window.allPlaylists.find(p => p.id == id);
            if(!pl) return;

            document.getElementById('playlistListView').style.display = 'none';
            document.getElementById('playlistDetailView').style.display = 'block';
            
            document.getElementById('detailTitle').innerText = pl.name;
            
            window.currentSongsInPlaylist = pl.songs || [];
            document.getElementById('detailMeta').innerText = `${window.currentSongsInPlaylist.length} Songs ${pl.is_public ? '(Public)' : '(Private)'}`;
            
            renderPlaylistSongs();
        }

        window.kembaliKeDaftar = function() {
            document.getElementById('playlistDetailView').style.display = 'none';
            document.getElementById('playlistListView').style.display = 'block';
            window.isAutoplayActive = false; // Matikan mode autoplay kalau keluar
        }

        // RENDER LAGU DI DALAM PLAYLIST
        window.renderPlaylistSongs = function() {
            const container = document.getElementById('playlistSongsContainer');
            container.innerHTML = '';

            if(window.currentSongsInPlaylist.length === 0) {
                container.innerHTML = `<div style="text-align:center; color:#b3b3b3; margin-top:20px;">Belum ada lagu di playlist ini. Tambahkan lagu dari Main!</div>`;
                return;
            }

            window.currentSongsInPlaylist.forEach(song => {
                const playIcon = `<svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>`;
                const coverHTML = `<div class="song-cover"><svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4v-10h4v-4h-6z"/></svg></div>`;
                
                const html = `
                    <div class="song-item">
                        ${coverHTML}
                        <div class="song-info">
                            <div class="song-title">${song.title}</div>
                            <div class="song-author">${song.artist}</div>
                        </div>
                        <button class="play-btn" onclick="playSong('${song.file_url}')">${playIcon}</button>
                    </div>
                `;
                container.innerHTML += html;
            });
        }

        // PLAYER & AUTOPLAY LOGIC
        const audioElement = document.getElementById('audioElement');
        
        window.playSong = function(url) {
            if(url === '#') return;
            document.getElementById('globalPlayer').classList.add('active');
            audioElement.src = url;
            audioElement.play();
        }

        window.playAutoplayRandom = function() {
            if(window.currentSongsInPlaylist.length === 0) {
                alert("Playlist kosong, tidak ada yang bisa di-play!"); return;
            }
            window.isAutoplayActive = true;
            mainkanLaguAcak();
        }

        function mainkanLaguAcak() {
            const indexAcak = Math.floor(Math.random() * window.currentSongsInPlaylist.length);
            const laguAcak = window.currentSongsInPlaylist[indexAcak];
            playSong(laguAcak.file_url);
        }

        audioElement.addEventListener('ended', function() {
            if(window.isAutoplayActive && window.currentSongsInPlaylist.length > 0) {
                mainkanLaguAcak();
            }
        });

    </script>
</body>
</html>
