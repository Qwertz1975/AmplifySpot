<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AmplifySpot - Main</title>
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap');
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: #121212; 
            color: #ffffff; 
            padding-bottom: 80px; /* Ruang untuk bottom nav */
            overflow-x: hidden;
        }

        /* HEADER & SEARCH */
        .header {
            padding: 20px;
            background: linear-gradient(180deg, #1f1f1f 0%, #121212 100%);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .logo { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 15px; }
        .logo span { color: #1db954; }
        
        .search-bar {
            width: 100%;
            background: #242424;
            border-radius: 25px;
            padding: 12px 20px;
            border: 1px solid transparent;
            color: white;
            font-size: 15px;
            outline: none;
            transition: 0.3s;
        }
        .search-bar:focus { border-color: #1db954; background: #2a2a2a; }

        /* SONG LIST */
        .content { padding: 0 20px; }
        .section-title { font-size: 18px; font-weight: 600; margin-bottom: 15px; margin-top: 10px; }
        
        .song-item {
            display: flex;
            align-items: center;
            padding: 10px;
            border-radius: 8px;
            transition: background 0.2s;
            margin-bottom: 5px;
        }
        .song-item:hover { background: #282828; }
        
        .song-cover {
            width: 50px;
            height: 50px;
            border-radius: 4px;
            background: #282828;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #b3b3b3;
            margin-right: 15px;
        }
        
        .song-info { flex: 1; overflow: hidden; }
        .song-title { font-weight: 600; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .song-author { font-size: 13px; color: #b3b3b3; margin-top: 3px; }
        
        .song-actions { display: flex; gap: 12px; align-items: center; }
        .action-btn { background: none; border: none; color: #b3b3b3; cursor: pointer; transition: 0.2s; padding: 5px; }
        .action-btn:hover { color: #ffffff; transform: scale(1.1); }
        .play-btn { color: #1db954; }

        /* BOTTOM NAV BAR */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(24, 24, 24, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid #282828;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 10px 0;
            z-index: 100;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #b3b3b3;
            text-decoration: none;
            font-size: 11px;
            cursor: pointer;
            transition: 0.2s;
            width: 25%;
        }
        .nav-item:hover, .nav-item.active { color: #ffffff; }
        .nav-icon { width: 24px; height: 24px; margin-bottom: 4px; fill: currentColor; }
        
        .nav-add-btn {
            background: #1db954;
            color: #000;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: -20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            border: 4px solid #121212;
            transition: 0.3s;
        }
        .nav-add-btn:hover { transform: scale(1.05); background: #1ed760; }
        .nav-add-btn svg { fill: #000; width: 20px; height: 20px; }

        /* UPLOAD MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 200;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: #181818;
            width: 100%;
            max-width: 400px;
            border-radius: 12px;
            padding: 25px;
            position: relative;
            border: 1px solid #282828;
        }
        .close-modal { position: absolute; top: 20px; right: 20px; font-size: 24px; color: #b3b3b3; cursor: pointer; }
        .modal-content h3 { margin-bottom: 20px; font-weight: 600; text-align: center; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 13px; color: #b3b3b3; margin-bottom: 5px; }
        .form-input {
            width: 100%; padding: 12px;
            background: #242424; border: 1px solid transparent;
            border-radius: 6px; color: white; outline: none;
        }
        .form-input:focus { border-color: #1db954; }
        .file-input {
            width: 100%; padding: 10px; background: #242424;
            border-radius: 6px; color: #b3b3b3; font-size: 13px;
        }
        
        .upload-btn {
            width: 100%; padding: 14px;
            background: #1db954; color: black;
            border: none; border-radius: 25px;
            font-weight: 600; font-size: 15px;
            cursor: pointer; margin-top: 10px; transition: 0.2s;
        }
        .upload-btn:hover { background: #1ed760; }
        #uploadStatus { text-align: center; margin-top: 10px; font-size: 13px; }

        /* GLOBAL AUDIO PLAYER (Hidden until played) */
        #globalPlayer {
            position: fixed; bottom: 65px; left: 0; width: 100%;
            background: #181818; padding: 10px 20px;
            display: none; align-items: center;
            border-top: 1px solid #282828; z-index: 99;
        }
        #globalPlayer.active { display: flex; }
        audio { width: 100%; height: 30px; outline: none; }
        audio::-webkit-media-controls-panel { background-color: #242424; }
        audio::-webkit-media-controls-current-time-display,
        audio::-webkit-media-controls-time-remaining-display { color: white; }
    </style>
</head>
<body>

    <!-- Header & Search -->
    <div class="header">
        <div class="logo">Amplify<span>Spot</span></div>
        <input type="text" id="searchInput" class="search-bar" placeholder="Cari lagu atau artis...">
    </div>

    <!-- Main Content -->
    <div class="content">
        <div class="section-title">Global Tracks</div>
        <div id="songList">
            <div style="text-align:center; color:#b3b3b3; margin-top:20px;">Memuat lagu...</div>
        </div>
    </div>

    <!-- Global Audio Player -->
    <div id="globalPlayer">
        <audio id="audioElement" controls controlsList="nodownload"></audio>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <div class="nav-item active" onclick="window.scrollTo(0,0)">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M12 3l10 9h-3v9h-14v-9h-3l10-9zm0 2.83l-7 6.3v7.87h14v-7.87l-7-6.3z"/></svg>
            Main
        </div>
        <div class="nav-item" onclick="window.location.href='/profile'">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M12 2c2.76 0 5 2.24 5 5s-2.24 5-5 5-5-2.24-5-5 2.24-5 5-5zm0 12c4.42 0 8 3.58 8 8h-16c0-4.42 3.58-8 8-8z"/></svg>
            Profile
        </div>
        <div class="nav-item">
            <div class="nav-add-btn" onclick="openModal()">
                <svg viewBox="0 0 24 24"><path d="M19 11h-6v-6h-2v6h-6v2h6v6h2v-6h6v-2z"/></svg>
            </div>
        </div>
        <div class="nav-item" onclick="window.location.href='/playlist'">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4v-10h4v-4h-6z"/></svg>
            Playlist
        </div>
    </div>

    <!-- Upload Modal -->
    <div class="modal" id="uploadModal">
        <div class="modal-content">
            <div class="close-modal" onclick="closeModal()">&times;</div>
            <h3>Upload to AmplifySpot</h3>
            
            <div class="form-group">
                <input type="text" id="songName" class="form-input" placeholder="Name Song" required>
            </div>
            <div class="form-group">
                <input type="text" id="authorName" class="form-input" placeholder="Author" required>
            </div>
            <div class="form-group">
                <label>Upload File (Must MP3)</label>
                <input type="file" id="mp3File" class="file-input" accept=".mp3,audio/mpeg" required>
            </div>
            
            <button class="upload-btn" onclick="uploadSong()">Upload</button>
            <div id="uploadStatus"></div>
        </div>
    </div>

    <script>
        // INISIALISASI SUPABASE
        const SUPABASE_URL = 'https://vnuyqnandbsuibnbbbcg.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_kV3A57UcwSynM2GufS_x4g_bsL4n--d';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let allSongs = [];

        // MODAL LOGIC
        const modal = document.getElementById('uploadModal');
        function openModal() { modal.classList.add('show'); }
        function closeModal() { modal.classList.remove('show'); document.getElementById('uploadStatus').innerText = ''; }

        // FETCH SONGS DARI DATABASE
        async function fetchSongs() {
            const list = document.getElementById('songList');
            const { data, error } = await supabase.from('songs').select('*').order('id', { ascending: false });
            
            if (error) {
                list.innerHTML = `<div style="text-align:center; color:#ff4d4d;">Gagal memuat lagu.</div>`;
                return;
            }
            
            allSongs = data;
            renderSongs(allSongs);
        }

        // RENDER UI LAGU
        function renderSongs(songs) {
            const list = document.getElementById('songList');
            list.innerHTML = '';

            if(songs.length === 0) {
                list.innerHTML = `<div style="text-align:center; color:#b3b3b3; margin-top:20px;">Belum ada lagu. Yuk upload!</div>`;
                return;
            }

            songs.forEach(song => {
                // SVG Icons
                const playIcon = `<svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>`;
                const favIcon = `<svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>`;
                const addIcon = `<svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>`;
                const dlIcon = `<svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>`;
                
                // Cover default
                const coverHTML = `<div class="song-cover"><svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4v-10h4v-4h-6z"/></svg></div>`;

                // Handle file mp3 url
                const audioUrl = song.file_url || '#';

                const html = `
                    <div class="song-item">
                        ${coverHTML}
                        <div class="song-info">
                            <div class="song-title">${song.title}</div>
                            <div class="song-author">${song.artist}</div>
                        </div>
                        <div class="song-actions">
                            <button class="action-btn" onclick="addToPlaylist()" title="Add to Playlist">${addIcon}</button>
                            <button class="action-btn" onclick="toggleFav(this)" title="Favorite">${favIcon}</button>
                            <button class="action-btn" onclick="downloadSong('${audioUrl}')" title="Download">${dlIcon}</button>
                            <button class="action-btn play-btn" onclick="playSong('${audioUrl}')" title="Play">${playIcon}</button>
                        </div>
                    </div>
                `;
                list.innerHTML += html;
            });
        }

        // FITUR PENCARIAN
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const filtered = allSongs.filter(song => 
                song.title.toLowerCase().includes(query) || 
                song.artist.toLowerCase().includes(query)
            );
            renderSongs(filtered);
        });

        // UPLOAD LOGIC
        async function uploadSong() {
            const title = document.getElementById('songName').value;
            const artist = document.getElementById('authorName').value;
            const mp3File = document.getElementById('mp3File').files[0];
            const status = document.getElementById('uploadStatus');

            if(!title || !artist || !mp3File) {
                status.style.color = '#ff4d4d';
                status.innerText = 'Nama, Author, dan File MP3 wajib diisi!';
                return;
            }

            status.style.color = '#a0a0a0';
            status.innerText = 'Mengupload file... Mohon tunggu.';

            try {
                let mp3Url = '';

                // 1. Upload MP3 ke bucket 'music'
                const mp3Name = `${Date.now()}_${mp3File.name}`;
                const { data: mp3Data, error: mp3Error } = await supabase.storage.from('music').upload(mp3Name, mp3File);
                if(mp3Error) throw new Error("Gagal upload MP3. Pastikan bucket 'music' ada.");
                mp3Url = supabase.storage.from('music').getPublicUrl(mp3Name).data.publicUrl;

                // 2. Simpan ke tabel 'songs'
                const { error: dbError } = await supabase.from('songs').insert([
                    { title: title, artist: artist, file_url: mp3Url }
                ]);

                if(dbError) throw dbError;

                status.style.color = '#1db954';
                status.innerText = 'Upload berhasil!';
                
                // Reset form & tutup modal
                setTimeout(() => {
                    document.getElementById('songName').value = '';
                    document.getElementById('authorName').value = '';
                    document.getElementById('mp3File').value = '';
                    closeModal();
                    fetchSongs(); // Refresh list global
                }, 1500);

            } catch (err) {
                console.error(err);
                status.style.color = '#ff4d4d';
                status.innerText = err.message || 'Terjadi kesalahan saat upload.';
            }
        }

        // PLAYER ACTIONS
        function playSong(url) {
            if(url === '#') {
                alert("URL lagu tidak ditemukan di database.");
                return;
            }
            const playerDiv = document.getElementById('globalPlayer');
            const audio = document.getElementById('audioElement');
            playerDiv.classList.add('active');
            audio.src = url;
            audio.play();
        }

        function downloadSong(url) {
            if(url === '#') return alert("File tidak tersedia.");
            window.open(url, '_blank');
        }

        function toggleFav(btn) {
            btn.style.color = btn.style.color === 'rgb(29, 185, 84)' ? '#b3b3b3' : '#1db954';
        }

        function addToPlaylist() {
            alert('Fitur tambah ke playlist akan tersedia di halaman /playlist!');
        }

        // Jalankan fetch saat halaman dibuka
        window.onload = fetchSongs;

    </script>
</body>
</html>
